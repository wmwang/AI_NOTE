<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320" style="font-family: 'Nunito', sans-serif; background: #f5f5f5; border-radius: 10px;">
  <!-- Browser chrome -->
  <rect x="0" y="0" width="600" height="30" rx="10" fill="#e0e0e0"/>
  <circle cx="20" cy="15" r="6" fill="#FF5F56"/>
  <circle cx="38" cy="15" r="6" fill="#FFBD2E"/>
  <circle cx="56" cy="15" r="6" fill="#27C93F"/>
  <rect x="80" y="8" width="300" height="14" rx="7" fill="white"/>

  <!-- Title bar -->
  <rect x="0" y="30" width="600" height="40" fill="#1565C0"/>
  <text x="20" y="55" font-size="14" font-weight="700" fill="white">📋 Azure DevOps — 工單 #12345</text>

  <!-- Left: 工單資訊 -->
  <rect x="15" y="80" width="270" height="230" rx="8" fill="white" filter="url(#shadow)"/>
  <text x="30" y="100" font-size="11" font-weight="700" fill="#333">標題</text>
  <rect x="30" y="105" width="240" height="22" rx="4" fill="#E3F2FD"/>
  <text x="35" y="120" font-size="10" fill="#1565C0">訂單 API 在大量訂單時回應 500 錯誤</text>

  <text x="30" y="140" font-size="11" font-weight="700" fill="#333">狀態</text>
  <rect x="30" y="145" width="60" height="18" rx="9" fill="#FFEBEE"/>
  <text x="60" y="158" text-anchor="middle" font-size="9" font-weight="700" fill="#C62828">Active</text>

  <text x="100" y="140" font-size="11" font-weight="700" fill="#333">優先級</text>
  <rect x="100" y="145" width="50" height="18" rx="9" fill="#FFF3E0"/>
  <text x="125" y="158" text-anchor="middle" font-size="9" font-weight="700" fill="#E65100">High</text>

  <text x="30" y="178" font-size="11" font-weight="700" fill="#333">指派</text>
  <rect x="30" y="183" width="80" height="18" rx="9" fill="#F5F5F5"/>
  <text x="70" y="196" text-anchor="middle" font-size="9" fill="#555">小明</text>

  <text x="30" y="215" font-size="11" font-weight="700" fill="#333">描述</text>
  <text x="30" y="233" font-size="9" fill="#666">當同時下單超過 100 筆時，</text>
  <text x="30" y="248" font-size="9" fill="#666">POST /api/v1/orders 回傳 500</text>
  <text x="30" y="263" font-size="9" fill="#666">Log 顯示資料庫連線池耗盡</text>

  <!-- Right: Acceptance Criteria -->
  <rect x="295" y="80" width="290" height="230" rx="8" fill="white" filter="url(#shadow)"/>
  <rect x="295" y="80" width="290" height="35" rx="8" fill="#F5F5F5"/>
  <text x="310" y="103" font-size="12" font-weight="700" fill="#333">✅ Acceptance Criteria</text>

  <rect x="310" y="125" width="260" height="40" rx="6" fill="#FAFAFA" stroke="#e0e0e0"/>
  <text x="320" y="142" font-size="10" fill="#333">✓ 修正連線池問題</text>
  <text x="320" y="158" font-size="9" fill="#888">目標：解決 500 錯誤</text>

  <rect x="310" y="172" width="260" height="40" rx="6" fill="#FAFAFA" stroke="#e0e0e0"/>
  <text x="320" y="189" font-size="10" fill="#333">✓ 壓測 500 筆同時下單不報錯</text>
  <text x="320" y="205" font-size="9" fill="#888">效能驗收標準</text>

  <rect x="310" y="220" width="260" height="40" rx="6" fill="#E8F5E9" stroke="#4CAF50"/>
  <text x="320" y="237" font-size="10" fill="#2E7D32">✓ 通過所有 CI 測試</text>
  <text x="320" y="253" font-size="9" fill="#888">覆蓋率 ≥ 80%</text>

  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.1"/>
    </filter>
  </defs>
</svg>