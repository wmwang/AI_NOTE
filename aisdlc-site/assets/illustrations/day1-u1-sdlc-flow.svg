<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" style="font-family: 'Nunito', sans-serif; background: #fafafa; border-radius: 10px;">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#333">AI 全自駕 SDLC — 六大環節</text>

  <!-- Six boxes -->
  <g transform="translate(40,50)">
    <!-- Box 1: 工單 -->
    <rect x="0" y="0" width="100" height="60" rx="8" fill="#E8F4FD" stroke="#2196F3" stroke-width="2" filter="url(#shadow)"/>
    <text x="50" y="25" text-anchor="middle" font-size="11" font-weight="700" fill="#1565C0">1. 工單</text>
    <text x="50" y="42" text-anchor="middle" font-size="10" fill="#666">ADO</text>

    <!-- Arrow 1-2 -->
    <path d="M105,30 L140,30" stroke="#2196F3" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

    <!-- Box 2: 分析 -->
    <rect x="145" y="0" width="100" height="60" rx="8" fill="#E8F5E9" stroke="#4CAF50" stroke-width="2" filter="url(#shadow)"/>
    <text x="195" y="25" text-anchor="middle" font-size="11" font-weight="700" fill="#2E7D32">2. 分析</text>
    <text x="195" y="42" text-anchor="middle" font-size="10" fill="#666">Wiki</text>

    <!-- Arrow 2-3 -->
    <path d="M250,30 L285,30" stroke="#4CAF50" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

    <!-- Box 3: 開發 -->
    <rect x="290" y="0" width="100" height="60" rx="8" fill="#FFF3E0" stroke="#FF9800" stroke-width="2" filter="url(#shadow)"/>
    <text x="340" y="25" text-anchor="middle" font-size="11" font-weight="700" fill="#E65100">3. 開發</text>
    <text x="340" y="42" text-anchor="middle" font-size="10" fill="#666">TDD</text>

    <!-- Arrow 3-4 -->
    <path d="M395,30 L430,30" stroke="#FF9800" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

    <!-- Box 4: 測試 -->
    <rect x="435" y="0" width="100" height="60" rx="8" fill="#F3E5F5" stroke="#9C27B0" stroke-width="2" filter="url(#shadow)"/>
    <text x="485" y="25" text-anchor="middle" font-size="11" font-weight="700" fill="#7B1FA2">4. 測試</text>
    <text x="485" y="42" text-anchor="middle" font-size="10" fill="#666">CI</text>

    <!-- Arrow 4-5 -->
    <path d="M540,30 L575,30" stroke="#9C27B0" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

    <!-- Box 5: PR Review -->
    <rect x="580" y="0" width="100" height="60" rx="8" fill="#E3F2FD" stroke="#3F51B5" stroke-width="2" filter="url(#shadow)"/>
    <text x="630" y="25" text-anchor="middle" font-size="11" font-weight="700" fill="#1A237E">5. PR</text>
    <text x="630" y="42" text-anchor="middle" font-size="10" fill="#666">Review</text>

    <!-- Arrow 5-6 (down) -->
    <path d="M680,65 L680,95" stroke="#3F51B5" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

    <!-- Box 6: 文件同步 -->
    <rect x="580" y="100" width="100" height="60" rx="8" fill="#E0F2F1" stroke="#00695C" stroke-width="2" filter="url(#shadow)"/>
    <text x="630" y="120" text-anchor="middle" font-size="11" font-weight="700" fill="#004D40">6. 文件同步</text>
    <text x="630" y="140" text-anchor="middle" font-size="10" fill="#666">Wiki 更新</text>

    <!-- Loop back arrow (left side) -->
    <path d="M580,130 L60,130" stroke="#00695C" stroke-width="2" stroke-dasharray="6,4" fill="none" marker-end="url(#arrow)"/>
    <text x="320" y="155" text-anchor="middle" font-size="10" fill="#00695C">知識庫閉環回饋</text>

    <!-- A2P badge 1 (工單) -->
    <rect x="0" y="70" width="60" height="20" rx="10" fill="#FFEBEE" stroke="#F44336" stroke-width="1"/>
    <text x="30" y="84" text-anchor="middle" font-size="9" font-weight="700" fill="#C62828">🔒 A2P</text>

    <!-- A2P badge 2 (PR) -->
    <rect x="580" y="70" width="60" height="20" rx="10" fill="#FFEBEE" stroke="#F44336" stroke-width="1"/>
    <text x="610" y="84" text-anchor="middle" font-size="9" font-weight="700" fill="#C62828">🔒 A2P</text>
  </g>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#666"/>
    </marker>
  </defs>

  <!-- Legend -->
  <text x="80" y="300" font-size="11" fill="#666">🔴 必須人類審批：合併 PR、部署正式環境</text>
  <text x="420" y="300" font-size="11" fill="#666">🟡 建議審批：新增依賴、變更 API</text>
  <text x="640" y="300" font-size="11" fill="#666">🟢 不需審批：文件更新、新增測試</text>
</svg>