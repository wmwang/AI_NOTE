  <!-- Day 4 -->
  <rect x="30" y="187" width="640" height="30" rx="4" fill="#FAFAFA" stroke="#e0e0e0"/>
  <rect x="38" y="192" width="24" height="20" rx="4" fill="#F3E5F5"/>
  <text x="50" y="207" text-anchor="middle" font-size="10" font-weight="800" fill="#7B1FA2">4</text>
