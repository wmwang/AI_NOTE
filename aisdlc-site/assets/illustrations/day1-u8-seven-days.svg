  <!-- Day 7 (highlight) -->
  <rect x="30" y="222" width="640" height="30" rx="4" fill="#FFF8E1" stroke="#FFC107" stroke-width="2"/>
  <rect x="38" y="227" width="24" height="20" rx="4" fill="#FFC107"/>
  <text x="50" y="242" text-anchor="middle" font-size="10" font-weight="800" fill="#E65100">7</text>
