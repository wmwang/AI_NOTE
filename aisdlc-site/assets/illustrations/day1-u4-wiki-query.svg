<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 280" style="font-family: 'Nunito', sans-serif; background: #f5f5f5; border-radius: 10px;">
  <!-- Browser chrome -->
  <rect x="0" y="0" width="600" height="30" rx="10" fill="#e0e0e0"/>
  <circle cx="20" cy="15" r="6" fill="#FF5F56"/><circle cx="38" cy="15" r="6" fill="#FFBD2E"/><circle cx="56" cy="15" r="6" fill="#27C93F"/>
  <rect x="80" y="8" width="300" height="14" rx="7" fill="white"/>

  <!-- Title bar -->
  <rect x="0" y="30" width="600" height="40" fill="#00695C"/>
  <text x="20" y="55" font-size="14" font-weight="700" fill="white">📚 Wiki — 搜尋結果</text>

  <!-- Search bar -->
  <rect x="20" y="80" width="560" height="30" rx="15" fill="white" filter="url(#shadow)"/>
  <text x="35" y="99" font-size="12" fill="#999">🔍  搜尋「訂單服務 連線池」</text>
  <rect x="480" y="88" width="80" height="14" rx="7" fill="#00695C"/>
  <text x="520" y="99" text-anchor="middle" font-size="9" font-weight="700" fill="white">搜尋</text>

  <!-- Result 1 -->
  <rect x="20" y="120" width="560" height="70" rx="8" fill="white" filter="url(#shadow)"/>
  <rect x="30" y="130" width="90" height="18" rx="4" fill="#E8F5E9"/>
  <text x="75" y="143" text-anchor="middle" font-size="9" font-weight="700" fill="#2E7D32">📄 文件</text>
  <text x="130" y="143" font-size="11" font-weight="700" fill="#1565C0">訂單服務架構文件</text>
  <text x="30" y="165" font-size="10" fill="#666">Wiki/Architecture/Order-Service</text>
  <text x="30" y="180" font-size="9" fill="#888">• Spring Boot 3.2 + JPA  • PostgreSQL 15  • HikariCP maxPoolSize=10</text>

  <!-- Result 2 -->
  <rect x="20" y="200" width="560" height="70" rx="8" fill="white" filter="url(#shadow)"/>
  <rect x="30" y="210" width="90" height="18" rx="4" fill="#FFF8E1"/>
  <text x="75" y="223" text-anchor="middle" font-size="9" font-weight="700" fill="#E65100">⚠️ 警告</text>
  <text x="130" y="223" font-size="11" font-weight="700" fill="#E65100">⚠️ 發現問題：20 個 instance × 10 connections = 200</text>
  <text x="30" y="242" font-size="10" fill="#C62828" font-weight="700">PostgreSQL max_connections = 100 — 連線池耗盡！</text>
  <text x="30" y="260" font-size="9" fill="#666">修復方案：調整 maxPoolSize 為 5 或使用 PgBouncer</text>

  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.1"/>
    </filter>
  </defs>
</svg>