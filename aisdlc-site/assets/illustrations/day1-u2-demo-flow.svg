<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 160" style="font-family: 'Nunito', monospace; background: #1a1a2e; border-radius: 10px;">
  <!-- Title -->
  <text x="450" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#e0e0e0">✨ The Finale — 全流程實演（8 分鐘完成）</text>

  <!-- 8 steps -->
  <g transform="translate(30, 40)">
