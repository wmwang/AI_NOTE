    <text x="175" y="36" text-anchor="middle" font-size="10" fill="#e0e0e0">📚 Wiki 查詢</text>
    <text x="175" y="54" text-anchor="middle" font-size="9" fill="#888">找到 2 篇</text>
    <rect x="135" y="68" width="80" height="12" rx="3" fill="#4CAF50" fill-opacity="0.2"/>
    <text x="175" y="78" text-anchor="middle" font-size="9" fill="#4CAF50">1 分鐘</text>

    <!-- Arrow -->
    <path d="M230,50 L245,50" stroke="#444" stroke-width="2" fill="none" marker-end="url(#a)"/>

    <!-- Step 3 -->
    <rect x="250" y="0" width="100" height="100" rx="8" fill="#1e2a3a" stroke="#FF9800" stroke-width="1.5"/>
    <text x="300" y="18" text-anchor="middle" font-size="9" fill="#FF9800" font-weight="700">Step 3/8</text>
    <text x="300" y="36" text-anchor="middle" font-size="10" fill="#e0e0e0">🔍 分析根因</text>
    <text x="300" y="54" text-anchor="middle" font-size="9" fill="#888">pool=200>100</text>
    <rect x="260" y="68" width="80" height="12" rx="3" fill="#FF9800" fill-opacity="0.2"/>
    <text x="300" y="78" text-anchor="middle" font-size="9" fill="#FF9800">1 分鐘</text>

    <!-- Arrow -->
    <path d="M355,50 L370,50" stroke="#444" stroke-width="2" fill="none" marker-end="url(#a)"/>

    <!-- Step 4 -->
    <rect x="375" y="0" width="100" height="100" rx="8" fill="#1e2a3a" stroke="#E91E63" stroke-width="1.5"/>
    <text x="425" y="18" text-anchor="middle" font-size="9" fill="#E91E63" font-weight="700">Step 4/8</text>
    <text x="425" y="36" text-anchor="middle" font-size="10" fill="#e0e0e0">🔴 TDD 開發</text>
    <text x="425" y="54" text-anchor="middle" font-size="9" fill="#888">🔴→🟢→♻️</text>
    <rect x="385" y="68" width="80" height="12" rx="3" fill="#E91E63" fill-opacity="0.2"/>
    <text x="425" y="78" text-anchor="middle" font-size="9" fill="#E91E63">3 分鐘</text>

    <!-- Arrow -->
    <path d="M480,50 L495,50" stroke="#444" stroke-width="2" fill="none" marker-end="url(#a)"/>

