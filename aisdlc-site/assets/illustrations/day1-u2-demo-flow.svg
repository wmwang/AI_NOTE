    <rect x="0" y="0" width="100" height="100" rx="8" fill="#1e2a3a" stroke="#2196F3" stroke-width="1.5"/>
    <text x="50" y="18" text-anchor="middle" font-size="9" fill="#2196F3" font-weight="700">Step 1/8</text>
    <text x="50" y="36" text-anchor="middle" font-size="10" fill="#e0e0e0">📋 讀取工單</text>
    <text x="50" y="54" text-anchor="middle" font-size="9" fill="#888">#12345</text>
    <rect x="10" y="68" width="80" height="12" rx="3" fill="#2196F3" fill-opacity="0.2"/>
    <text x="50" y="78" text-anchor="middle" font-size="9" fill="#2196F3">30 秒</text>

    <!-- Arrow -->
    <path d="M105,50 L120,50" stroke="#444" stroke-width="2" fill="none" marker-end="url(#a)"/>

    <!-- Step 2 -->
    <rect x="125" y="0" width="100" height="100" rx="8" fill="#1e2a3a" stroke="#4CAF50" stroke-width="1.5"/>
