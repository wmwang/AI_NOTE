    <text x="550" y="18" text-anchor="middle" font-size="9" fill="#9C27B0" font-weight="700">Step 5/8</text>
    <text x="550" y="36" text-anchor="middle" font-size="10" fill="#e0e0e0">✅ 執行測試</text>
    <text x="550" y="54" text-anchor="middle" font-size="9" fill="#888">24/24 通過</text>
    <rect x="510" y="68" width="80" height="12" rx="3" fill="#9C27B0" fill-opacity="0.2"/>
    <text x="550" y="78" text-anchor="middle" font-size="9" fill="#9C27B0">1 分鐘</text>

    <!-- Arrow -->
    <path d="M605,50 L620,50" stroke="#444" stroke-width="2" fill="none" marker-end="url(#a)"/>

    <!-- Step 6 -->
    <rect x="625" y="0" width="100" height="100" rx="8" fill="#1e2a3a" stroke="#00BCD4" stroke-width="1.5"/>
    <text x="675" y="18" text-anchor="middle" font-size="9" fill="#00BCD4" font-weight="700">Step 6/8</text>
    <text x="675" y="36" text-anchor="middle" font-size="10" fill="#e0e0e0">👀 AI Review</text>
    <text x="675" y="54" text-anchor="middle" font-size="9" fill="#888">✅⚠️❌</text>
    <rect x="635" y="68" width="80" height="12" rx="3" fill="#00BCD4" fill-opacity="0.2"/>
    <text x="675" y="78" text-anchor="middle" font-size="9" fill="#00BCD4">1 分鐘</text>

    <!-- Arrow -->
    <path d="M730,50 L745,50" stroke="#444" stroke-width="2" fill="none" marker-end="url(#a)"/>

    <!-- Step 7 -->
