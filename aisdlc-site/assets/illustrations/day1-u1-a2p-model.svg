<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" style="font-family: 'Nunito', sans-serif; background: #fefaf6; border-radius: 10px;">
  <!-- Title -->
  <text x="300" y="30" text-anchor="middle" font-size="15" font-weight="700" fill="#333">A2P（Agent-to-Person）安全審批模型</text>

  <!-- AI Agent box -->
  <rect x="60" y="70" width="160" height="80" rx="12" fill="#E3F2FD" stroke="#1565C0" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="140" y="98" text-anchor="middle" font-size="16" font-weight="800" fill="#1565C0">🤖 AI Agent</text>
  <text x="140" y="118" text-anchor="middle" font-size="11" fill="#555">執行任務</text>
  <text x="140" y="136" text-anchor="middle" font-size="10" fill="#888">自動化工作流</text>

  <!-- Arrow to Human -->
  <path d="M230,110 L310,110" stroke="#1565C0" stroke-width="3" fill="none" marker-end="url(#arrowBlue)"/>
  <text x="270" y="100" text-anchor="middle" font-size="10" font-weight="700" fill="#1565C0">🔴 請求批准</text>

  <!-- Human Approver box -->
  <rect x="320" y="70" width="160" height="80" rx="12" fill="#FFF3E0" stroke="#E65100" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="400" y="98" text-anchor="middle" font-size="16" font-weight="800" fill="#E65100">👤 人類審批者</text>
  <text x="400" y="118" text-anchor="middle" font-size="11" fill="#555">最終決策</text>
  <text x="400" y="136" text-anchor="middle" font-size="10" fill="#888">破壞性操作把關</text>

  <!-- Arrow back to AI -->
  <path d="M310,140 L230,140" stroke="#4CAF50" stroke-width="3" fill="none" marker-end="url(#arrowGreen)"/>
  <text x="270" y="155" text-anchor="middle" font-size="10" font-weight="700" fill="#4CAF50">✅ 批准 / ❌ 拒絕</text>

  <!-- A2P badge -->
  <rect x="230" y="165" width="80" height="24" rx="12" fill="#FFEBEE" stroke="#C62828" stroke-width="1.5"/>
  <text x="270" y="182" text-anchor="middle" font-size="11" font-weight="800" fill="#C62828">🔒 A2P</text>

  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1565C0"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#4CAF50"/>
    </marker>
  </defs>
</svg>